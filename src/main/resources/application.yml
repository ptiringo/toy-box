server:
  port: ${PORT:8080}

spring:
  application:
    name: api
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      # Spring MVC 標準例外（リクエストボディ不正・媒体型不一致等）を RFC 9457 形式に変換する
      enabled: true

springdoc:
  show-actuator: true

# Spring Boot Actuator の設定
management:
  endpoints:
    web:
      exposure:
        # セキュリティのため、ヘルスチェックエンドポイントのみ公開
        include: health
  endpoint:
    health:
      # 詳細な情報は認証された場合のみ表示（セキュリティ考慮）
      show-details: when-authorized
