server:
  port: ${PORT:8080}

spring:
  application:
    name: api
  threads:
    virtual:
      enabled: true
  # ランタイムの永続化データソース。永続化実装は JDBC 一本に統一し（ADR-0030）、JDBC リポジトリが実際に
  # 読み書きする。デフォルトは Docker 不要の組み込み H2 を PostgreSQL 互換モード（識別子は小文字へ畳む）で
  # 使い、本番ターゲット DB（PostgreSQL）の挙動へ寄せる。本番は環境変数で datasource を PostgreSQL に
  # 差し替える（Cloud SQL 新設・Cloud Run 配線は別途インフラ作業）。永続化の契約テストは本番ターゲットの
  # PostgreSQL を Testcontainers で用意して検証する（PostgresContainerSupport が datasource を上書きする）。
  datasource:
    url: jdbc:h2:mem:toybox;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  # マイグレーションは Flyway（plain SQL）。db/migration 配下の V*.sql を起動時に適用する。
  flyway:
    enabled: true
  jackson:
    # JSON ボディのフィールド名を snake_case で表現する（request/response bean に一括適用）。
    # URL=camelCase / ボディ=snake_case の命名規約は ADR-0012 を参照。
    # 注: ProblemDetail.properties は Map のため naming strategy が効かず、拡張キーは setProperty で個別に snake_case 指定する。
    property-naming-strategy: SNAKE_CASE
  ai:
    mcp:
      server:
        name: toy-box-mcp
        version: 0.1.0
        # WebMVC の Streamable HTTP トランスポート。SSE/STATELESS も選べるが現行 MCP の標準は STREAMABLE。
        protocol: STREAMABLE
  mvc:
    problemdetails:
      # Spring MVC 標準例外（リクエストボディ不正・媒体型不一致等）を RFC 9457 形式に変換する
      enabled: true

springdoc:
  show-actuator: true

# Spring Boot Actuator の設定
management:
  endpoints:
    web:
      exposure:
        # セキュリティのため、ヘルスチェックエンドポイントのみ公開
        include: health
  endpoint:
    health:
      # 詳細な情報は認証された場合のみ表示（セキュリティ考慮）
      show-details: when-authorized
