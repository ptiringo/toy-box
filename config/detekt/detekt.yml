# detekt 設定ファイル
#
# `buildUponDefaultConfig = true` を設定しているため、detekt 内部のデフォルト設定に
# このファイルの内容がマージされます。プロジェクト固有の上書きのみを記述します。
#
# 雛形を再生成したい場合: `./gradlew detektGenerateConfig`
# 雛形の全項目は detekt 公式のデフォルト設定を参照してください:
#   https://github.com/detekt/detekt/blob/main/detekt-core/src/main/resources/default-detekt-config.yml

empty-blocks:
  # Spring Boot 標準の `contextLoads` テストや、sandbox の探索的実装で
  # 意図的に空の関数本体を残すケースがあるため無効化する。
  EmptyFunctionBlock:
    active: false

style:
  # このプロジェクトは sandbox であり、ドメインモデルの探索的実装として
  # TODO コメントを意図的に残している（CLAUDE.md 参照）。
  # 個別の TODO 解消は別 issue で扱うため検出対象から外す。
  ForbiddenComment:
    active: false
  # テスト規約（CLAUDE.md 参照）: JUnit 5 の org.junit.jupiter.api.Test と
  # Power Assert（stdlib の kotlin.assert）を使用する。マルチプラットフォーム対応は
  # 不要なため kotlin.test の誤 import を機械的に禁止する。
  ForbiddenImport:
    active: true
    forbiddenImports:
      - reason:
          'kotlin.test は使用禁止。テストには org.junit.jupiter.api.Test と
          Power Assert (kotlin.assert) を使用すること（CLAUDE.md テスト規約参照）。'
        value: 'kotlin.test.*'

# toy-box プロジェクト固有のカスタムルールセット（detekt-rules モジュールで定義）。
toy-box:
  # ドメイン / アプリケーション層は Result-first を保ち throw しない（.claude/rules/error-handling.md）。
  # Controller 境界（orThrowProblem）と infrastructure はルール側のパッケージ判定で対象外。
  # テストコード（fixture 等で throw しうる）は path で除外する。
  NoThrowInDomainAndApplication:
    active: true
    excludes: ['**/src/test/**', '**/src/testFixtures/**']
