# Kotlin/Java コードベースに対して CodeQL セキュリティ分析を実行し、脆弱性を検出します。
name: CodeQL Analysis
run-name: CodeQL Analysis for ${{ github.ref }}

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]
  push:
    branches: [ main ]
  schedule:
    # 毎週月曜日の午前9時（JST）に定期実行
    - cron: '0 0 * * 1'

jobs:
  analyze:
    runs-on: ubuntu-latest
    name: Analyze Kotlin/Java
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version-file: '.java-version'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: basic

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: java-kotlin

      # CodeQL は解析用に production コードがコンパイルできれば十分。
      # assemble は check 配下（test / ktfmt / detekt / koverVerify）を一切呼ばないため、
      # 検証タスクの個別除外が不要で、check に検証が増えてもメンテ不要。
      - name: Build with Gradle
        run: ./gradlew assemble --stacktrace

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: '/language:java-kotlin'
