# ShellCheck ワークフロー
#
# 目的: シェルスクリプトの変更時に ShellCheck を実行し、
# ローカルの pre-commit と同じ品質ゲートを CI でも担保する。

name: ShellCheck

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.sh'
      - '.github/workflows/shellcheck.yml'
  push:
    branches: [ main ]
    paths:
      - '**/*.sh'
      - '.github/workflows/shellcheck.yml'
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    name: Lint shell scripts
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    # mise バイナリのみ用意し、全ツールの `mise install --locked` は走らせない（install: false）。
    # ランナー環境のグローバル mise 設定に含まれる無関係ツールまで巻き込んで lock 解決に失敗するのを避け、
    # 本ジョブに必要な ShellCheck だけをスコープしてインストールする。
    - name: Install mise
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        install: false

    - name: Install ShellCheck
      run: mise install "aqua:koalaman/shellcheck"

    - name: Run ShellCheck
      run: |
        mise exec "aqua:koalaman/shellcheck" -- shellcheck --version
        find . -name '*.sh' -not -path './.git/*' -print0 \
          | xargs -0 mise exec "aqua:koalaman/shellcheck" -- shellcheck
