# Terraform検証およびフォーマットチェックワークフロー
#
# 目的: プルリクエストおよびプッシュ時に自動的にterraform validateとフォーマットチェックを実行し、
# Terraform設定の品質と一貫したフォーマットを確保する。

name: Terraform Check

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
    paths:
      - 'infra/**'
  push:
    branches: [ main ]
    paths:
      - 'infra/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: infra

jobs:
  terraform-check:
    runs-on: ubuntu-latest
    name: Terraform Validation and Format Check
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Install mise
      uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

    - name: Verify Terraform version
      run: terraform version

    - name: Initialize Terraform
      # -backend=false フラグは、CI上でバックエンド設定を無視し、プロバイダーのみを初期化するために使用しています。
      # これにより、リモートステートへのアクセス不要でvalidateやfmt等のチェックが可能です。
      run: terraform init -backend=false

    - name: Terraform Format Check
      run: terraform fmt -check -recursive

    - name: Terraform Validation
      run: terraform validate

    # tflint による lint（ADR-0017 / #377 フェーズ1: recommended preset、--init 不要）。
    # mise 管理の tflint を使う。GCP ruleset を足すフェーズ2 で --init + キャッシュを導入する。
    - name: Run tflint
      run: tflint --recursive
