# Pull Request 時にテストと ktfmt チェックを自動実行し、mainブランチへの壊れたコードのマージを防止します。
name: API Tests
run-name: API Tests for ${{ github.ref }}

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run API Tests
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: '.java-version'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: basic

      - name: Run ktfmt check
        run: ./gradlew ktfmtCheck --stacktrace

      - name: Run detekt
        run: ./gradlew detekt --stacktrace

      - name: Run API tests
        run: ./gradlew test --stacktrace

      # 成熟パッケージの行カバレッジ下限（ラチェット）を検証する。下回るとここで失敗する。
      - name: Verify coverage gate
        run: ./gradlew koverVerifyMature --stacktrace

      # 全体／成熟ゲートの行カバレッジを PR の Job Summary に出す（外部サービス不要）。
      # ゲートが落ちても数値が見えるよう always() で実行する。
      - name: Report coverage
        if: always()
        run: |
          {
            echo '## 🧪 テストカバレッジ'
            echo ''
            ./gradlew koverLog koverLogMature --console=plain 2>&1 \
              | grep 'カバレッジ' | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"
