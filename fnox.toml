# fnox によるシークレット管理設定
#
# このファイルには「暗号化済みの値」または「外部参照（op:// など）」のみを記載し、
# 平文のシークレットは決して書かない。そのため git にコミットしてよい。
#
# 値の解決には 1Password CLI (op) を使う。op がデスクトップアプリ連携または
# `op signin` でサインイン済みであれば、サービスアカウントトークンは不要。
# 詳細な運用手順は .claude/rules/secrets.md を参照。

[providers.onepass]
type = "1password"

[secrets]
# 現状、リポジトリ管理下で定義しているシークレットはない。
# GitHub MCP は OAuth 認証へ移行したため PAT の env 補間は不要になった（CLAUDE.md「MCP サーバー設定」参照）。
# 将来 GCP 認証情報などを扱う場合は、ここに op:// 参照を追加する（実トークンはここには入れない）。
# 例: SOME_TOKEN = { provider = "onepass", value = "op://<vault>/<item>/<field>", description = "..." }
